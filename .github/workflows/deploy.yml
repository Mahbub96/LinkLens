name: LinkLens Production CI/CD Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migration:
        description: 'Run Prisma Database Sync (npx prisma db push)'
        type: boolean
        required: false
        default: true
      run_seed:
        description: 'Run Prisma Database Seeder (npm run prisma:seed)'
        type: boolean
        required: false
        default: false

jobs:
  build-and-deploy:
    name: Build & Deploy Standalone Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ─── 1. BACKEND STANDALONE BUILD ───
      - name: 📦 Build Backend (NestJS & Prisma)
        run: |
          cd backend
          npm ci
          npx prisma generate
          npm run build
          npm prune --production

      # ─── 2. FRONTEND STANDALONE BUILD ───
      - name: 🌐 Build Frontend (Next.js Standalone)
        run: |
          cd frontend
          npm ci
          npm run build

      # ─── 3. ASSEMBLE DEPLOYMENT BUNDLE ───
      - name: 🗂️ Assemble Standalone Deployment Package
        run: |
          mkdir -p deploy-package/backend deploy-package/frontend

          # Copy Backend compiled dist & dependencies
          cp -r backend/dist deploy-package/backend/dist
          cp -r backend/node_modules deploy-package/backend/node_modules
          cp -r backend/prisma deploy-package/backend/prisma
          cp backend/package.json deploy-package/backend/package.json

          # Copy Frontend Standalone output, static assets, and public files
          cp -r frontend/.next/standalone/* deploy-package/frontend/
          mkdir -p deploy-package/frontend/.next
          cp -r frontend/.next/static deploy-package/frontend/.next/static
          cp -r frontend/public deploy-package/frontend/public

          # Copy PM2 Ecosystem configuration
          cp ecosystem.config.js deploy-package/ecosystem.config.js

          # Compress deployment bundle into a single archive
          tar -czf deploy.tar.gz -C deploy-package .

      # ─── 4. TRANSFER ARCHIVE TO REMOTE SERVER ───
      - name: 🚀 Upload Deployment Package to Remote Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: 'deploy.tar.gz'
          target: ${{ secrets.DEPLOY_DIR || '/var/www/linklens' }}

      # ─── 5. UNPACK, DB MIGRATE/SEED, & PM2 RESTART ───
      - name: ⚡ Extract Bundle, Migrate DB, & Reload PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            TARGET_DIR="${{ secrets.DEPLOY_DIR || '/var/www/linklens' }}"
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR

            # Unpack uploaded archive
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Install PM2 globally if not already installed
            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2 globally..."
              npm install -g pm2
            fi

            # Database Migration (Sync schema)
            IF_MIGRATE="${{ github.event.inputs.run_migration }}"
            if [ "$IF_MIGRATE" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
              echo "🗄️ Running Prisma Database Sync..."
              cd backend
              npx prisma db push
              cd ..
            fi

            # Database Seeder (when triggered via workflow_dispatch with run_seed = true)
            IF_SEED="${{ github.event.inputs.run_seed }}"
            if [ "$IF_SEED" = "true" ]; then
              echo "🌱 Running Prisma Database Seeder..."
              cd backend
              npm run prisma:seed
              cd ..
            fi

            # Reload/Start PM2 Application Cluster
            echo "🔄 Reloading PM2 Processes..."
            pm2 startOrReload ecosystem.config.js --env production
            pm2 save
            echo "✅ Deployment completed successfully!"
