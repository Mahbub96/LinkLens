name: LinkLens Production CI/CD Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migration:
        description: 'Run Prisma Database Sync (npx prisma db push)'
        type: boolean
        required: false
        default: true
      run_seed:
        description: 'Run Prisma Database Seeder (npm run prisma:seed)'
        type: boolean
        required: false
        default: false

jobs:
  build-and-deploy:
    name: Build & Deploy Standalone Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ─── 1. BACKEND STANDALONE BUILD ───
      - name: 📦 Build Backend (NestJS & Prisma)
        run: |
          cd backend
          npm ci
          npx prisma generate
          npm run build
          npm prune --production

      # ─── 2. FRONTEND STANDALONE BUILD ───
      - name: 🌐 Build Frontend (Next.js Standalone)
        run: |
          cd frontend
          npm ci
          npm run build

      # ─── 3. ASSEMBLE DEPLOYMENT BUNDLE ───
      - name: 🗂️ Assemble Standalone Deployment Package
        run: |
          mkdir -p deploy-package/backend deploy-package/frontend

          # Copy Backend compiled dist & dependencies
          cp -r backend/dist deploy-package/backend/dist
          cp -r backend/node_modules deploy-package/backend/node_modules
          cp -r backend/prisma deploy-package/backend/prisma
          cp backend/package.json deploy-package/backend/package.json

          # Copy Frontend Standalone output, static assets, and public files (if present)
          cp -r frontend/.next/standalone/* deploy-package/frontend/
          mkdir -p deploy-package/frontend/.next
          cp -r frontend/.next/static deploy-package/frontend/.next/static
          if [ -d "frontend/public" ]; then
            cp -r frontend/public deploy-package/frontend/public
          fi

          # Copy PM2 Ecosystem configuration
          cp ecosystem.config.js deploy-package/ecosystem.config.js

          # Compress deployment bundle into a single archive
          tar -czf deploy.tar.gz -C deploy-package .

      # ─── 4. SETUP SSH KEY & HOST KEYS ───
      - name: 🔑 Setup SSH Key Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Upload Deployment Package to Remote Server
        run: |
          SSH_PORT="${{ secrets.SERVER_PORT || 22 }}"
          SSH_USER="${{ secrets.SERVER_USER }}"
          SSH_HOST="${{ secrets.SERVER_IP }}"
          TARGET_DIR="${{ secrets.DEPLOY_DIR || '/var/www/html/LinkLens' }}"

          # Add remote server host key to known_hosts
          mkdir -p ~/.ssh
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Ensure target directory exists on remote server with write permissions
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p $TARGET_DIR 2>/dev/null || (sudo mkdir -p $TARGET_DIR && sudo chown -R $SSH_USER $TARGET_DIR)"

          # Transfer deployment archive via native OpenSSH SCP
          scp -P $SSH_PORT deploy.tar.gz $SSH_USER@$SSH_HOST:$TARGET_DIR/deploy.tar.gz

      # ─── 5. UNPACK, DB MIGRATE/SEED, & PM2 RESTART ON TARGET SERVER ───
      - name: ⚡ Extract Bundle, Migrate DB, & Reload PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: GITHUB_EVENT_NAME,RUN_MIGRATION,RUN_SEED,DEPLOY_DIR
          script: |
            # Source NVM or append common Node/npm/PM2 binaries to PATH for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi
            LATEST_NVM_NODE=$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -n 1)
            if [ -n "$LATEST_NVM_NODE" ]; then
              export PATH=$HOME/.nvm/versions/node/$LATEST_NVM_NODE/bin:$PATH
            fi
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin:$HOME/.npm-global/bin:$HOME/.yarn/bin

            TARGET_DIR="${{ secrets.DEPLOY_DIR || '/var/www/html/LinkLens' }}"
            mkdir -p $TARGET_DIR
            cd $TARGET_DIR

            # Unpack uploaded archive
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz

            # Check for node & npm
            if ! command -v npm &> /dev/null; then
              echo "❌ Error: npm is not found in PATH on the remote server."
              echo "PATH is currently: $PATH"
              exit 1
            fi

            # Install PM2 globally if not already installed
            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2 globally..."
              npm install -g pm2 || sudo npm install -g pm2
            fi

            # Database Migration (Sync schema)
            IF_MIGRATE="${{ github.event.inputs.run_migration }}"
            if [ "$IF_MIGRATE" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
              echo "🗄️ Running Prisma Database Sync..."
              cd backend
              npx prisma db push
              cd ..
            fi

            # Database Seeder (when triggered via workflow_dispatch with run_seed = true)
            IF_SEED="${{ github.event.inputs.run_seed }}"
            if [ "$IF_SEED" = "true" ]; then
              echo "🌱 Running Prisma Database Seeder..."
              cd backend
              npm run prisma:seed
              cd ..
            fi

            # Reload/Start PM2 Application Cluster
            echo "🔄 Reloading PM2 Processes..."
            pm2 startOrReload ecosystem.config.js --env production
            pm2 save
            echo "✅ Deployment completed successfully!"
